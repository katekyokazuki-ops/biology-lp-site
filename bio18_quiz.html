<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>確認テスト｜ゼロからわかる高校生物 #18 細胞内共生説・原核細胞と真核細胞</title>
<style>
  :root {
    --primary: #1a4b8c;
    --secondary: #e63946;
    --accent: #2ec4b6;
    --bg: #f0f4f8;
    --card: #ffffff;
    --correct: #2d6a4f;
    --wrong: #c1121f;
    --correct-bg: #d8f3dc;
    --wrong-bg: #ffe5e5;
    --text: #1b2631;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Helvetica Neue', 'Hiragino Kaku Gothic ProN', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 20px;
  }
  header {
    background: linear-gradient(135deg, #1a3a6c, #2e7d8c);
    color: white;
    text-align: center;

    border-radius: 16px;
    margin-bottom: 24px;
    box-shadow: 0 4px 20px rgba(26,58,108,0.35);

  .series-badge {
    display: inline-block;
    background: var(--secondary);
    color: white;
    border-radius: 20px;
    padding: 4px 14px;
    font-size: 0.8rem;
    margin-bottom: 10px;
    font-weight: bold;
  }
  #progress-container {
    background: rgba(255,255,255,0.3);

    height: 8px;

  }

    background: #f4a261;

  #progress-text { font-size: 0.8rem; margin-top: 6px; opacity: 0.9; }

  .question-card {
    background: var(--card);
    border-radius: 16px;

    margin-bottom: 20px;

    border-left: 5px solid var(--primary);
    display: none;
  }
  .question-card.active { display: block; }
  .question-number {
    font-size: 0.75rem;
    font-weight: bold;
    color: var(--primary);
    letter-spacing: 1px;
    margin-bottom: 12px;
  }
  .question-text {
    font-size: 1.05rem;
    line-height: 1.7;
    margin-bottom: 20px;
    font-weight: 500;
  }
  .tag {
    display: inline-block;
    background: #e8f0fe;

    border-radius: 12px;
    padding: 3px 10px;
    font-size: 0.75rem;
    margin-bottom: 14px;
  }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .option-btn {
    background: var(--bg);
    border: 2px solid #dce6f0;
    border-radius: 12px;
    padding: 14px 18px;
    text-align: left;
    cursor: pointer;
    font-size: 0.95rem;
    transition: all 0.2s;
    line-height: 1.5;
  }
  .option-btn:hover:not(:disabled) {
    background: #e8f0fe;
    border-color: var(--primary);
    transform: translateX(4px);
  }
  .option-btn.correct {
    background: var(--correct-bg);
    border-color: var(--correct);
    color: var(--correct);
    font-weight: bold;
  }
  .option-btn.wrong {
    background: var(--wrong-bg);
    border-color: var(--wrong);
    color: var(--wrong);
  }
  .option-btn:disabled { cursor: not-allowed; }
  .feedback {
    display: none;
    margin-top: 16px;
    padding: 14px 18px;
    border-radius: 12px;
    font-size: 0.9rem;
    line-height: 1.6;
  }
  .feedback.show { display: block; }
  .feedback.correct-fb { background: var(--correct-bg); color: var(--correct); border-left: 4px solid var(--correct); }
  .feedback.wrong-fb { background: var(--wrong-bg); color: var(--wrong); border-left: 4px solid var(--wrong); }
  .next-btn {
    display: none;
    margin-top: 16px;
    background: var(--primary);
    color: white;
    border: none;
    border-radius: 10px;
    padding: 12px 28px;
    font-size: 0.95rem;
    cursor: pointer;
    font-weight: bold;
    transition: background 0.2s;
  }
  .next-btn:hover { background: #163d7a; }
  .next-btn.show { display: inline-block; }

  #results {
    display: none;
    background: var(--card);
    border-radius: 20px;
    padding: 40px 30px;
    text-align: center;
    box-shadow: 0 4px 20px rgba(0,0,0,0.1);
  }
  #results h2 { font-size: 1.6rem; color: var(--primary); margin-bottom: 16px; }
  #score-circle {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    background: linear-gradient(135deg, #1a3a6c, #2e7d8c);

    align-items: center;

    margin: 20px auto;
    color: white;
    box-shadow: 0 6px 24px rgba(26,58,108,0.35);

  #score-circle .score-num { font-size: 2.5rem; font-weight: bold; line-height: 1; }
  #score-circle .score-label { font-size: 0.8rem; opacity: 0.85; }
  #score-message { font-size: 1.05rem; margin: 16px 0; color: #555; }
  .result-bar { background: #eee; border-radius: 8px; height: 10px; margin: 8px 0; overflow: hidden; }
  .result-bar-fill { height: 100%; border-radius: 8px; background: linear-gradient(to right, #1a3a6c, var(--accent)); transition: width 1s ease; }
  #result-pct { font-size: 0.9rem; color: #666; }
  #retry-btn {
    background: var(--secondary);
    color: white;
    border: none;
    border-radius: 12px;
    padding: 14px 36px;
    font-size: 1rem;
    cursor: pointer;

  }

  .note-link {

    margin-top: 16px;

    text-decoration: none;

  @media (max-width: 600px) {
    header h1 { font-size: 1.2rem; }

<body>

  <div class="series-badge">ゼロからわかる高校生物 #18</div>

<script>
const questions = [

  },
  {
    q: "葉緑体の起源として細胞内共生説が示す祖先の細菌はどれか？",
    tag: "葉緑体の起源",
    opts: [
      "αプロテオバクテリア",
      "硫酸還元菌",
      "シアノバクテリア",

    ans: 2,
    explain: "✅ 葉緑体の祖先はシアノバクテリア（光合成を行う細菌）です。シアノバクテリアが真核細胞に取り込まれ、葉緑体となったと考えられています。"
  },
  {
    q: "細胞内共生説を支持する証拠として誤っているものはどれか？",
    tag: "共生説の証拠（誤り選択）",

  },
  {
    q: "ミトコンドリア・葉緑体がもつリボソームの型はどれか？",
    tag: "リボソームの型",
    opts: [
      "80S型（真核生物型）",
      "60S型",
      "70S型（原核生物型）",

    ans: 2,
    explain: "✅ ミトコンドリア・葉緑体のリボソームは70S型で、原核生物（細菌）のリボソームと同じ型です。これが共生説の重要な証拠の一つであり、また抗生物質（クロラムフェニコールなど）がミトコンドリアに影響を与える可能性がある理由でもあります。"
  },
  {
    q: "ミトコンドリアの膜が二重構造である理由を細胞内共生説で正しく説明しているものはどれか？",

    opts: [
      "内膜も外膜も宿主細胞の細胞膜に由来する",
      "内膜は共生した細菌の細胞膜に由来し、外膜は宿主細胞が取り込む際に形成したものに由来する",

    ans: 1,

  },
  {
    q: "一次共生と二次共生の違いについて正しく説明しているものはどれか？",
    tag: "一次共生と二次共生",
    opts: [
      "一次共生：真核細胞が細菌を取り込み、葉緑体を形成（膜は2枚）。二次共生：真核生物が一次共生した真核藻類を取り込み（膜は3〜4枚）",
      "一次共生：細菌同士が融合する。二次共生：真核細胞が細菌を取り込む",
      "一次共生：葉緑体が形成される。二次共生：ミトコンドリアが形成される",
      "一次共生・二次共生ともに膜の枚数は変わらない"
    ],
    ans: 0,
    explain: "✅ 一次共生では真核細胞が細菌を直接取り込み、葉緑体（二重膜）が形成されます。二次共生では、一次共生が起きた真核藻類をさらに別の真核生物が取り込んだもので、膜が3〜4枚になります（褐藻類・ケイ藻類など）。"
  },
  {
    q: "原核細胞と真核細胞のリボソームの型を正しく組み合わせているものはどれか？",
    tag: "原核・真核のリボソーム",
    opts: [
      "原核細胞：80S型、真核細胞：70S型",
      "原核細胞：70S型、真核細胞：80S型",
      "原核細胞：60S型、真核細胞：70S型",
      "原核細胞・真核細胞ともに80S型"
    ],
    ans: 1,
    explain: "✅ 原核細胞は70S型リボソーム、真核細胞は80S型リボソームをもちます。この違いは抗生物質の選択毒性に直結します（70Sを標的にした抗生物質は原核細胞のみを攻撃できる）。"
  },
  {
    q: "原核細胞の説明として正しいものはどれか？",
    tag: "原核細胞の特徴",
    opts: [
      "核膜で囲まれた明確な核をもつ",
      "ミトコンドリアや小胞体などの膜小器官が豊富に存在する",
      "核膜がなく、DNAは核様体として細胞質に存在する",
      "DNA は線状で、ヒストンタンパク質に巻き付いている"
    ],
    ans: 2,
    explain: "✅ 原核細胞には核膜がなく、DNAは「核様体（nucleoid）」として細胞質に存在します。また、原核細胞のDNAは環状で、ヒストンをもたないことも重要な特徴です。"
  },
  {
    q: "ペニシリンが細菌（原核細胞）に効いてヒト細胞（真核細胞）に効かない理由として正しいものはどれか？",
    tag: "ペニシリンの選択毒性",
    opts: [
      "ペニシリンは70Sリボソームのタンパク質合成を阻害するが、ヒトは80Sリボソームをもつから",
      "ペニシリンは細菌細胞壁のペプチドグリカン合成を阻害するが、ヒト細胞は細胞壁をもたないから",
      "ペニシリンは環状DNAの複製を阻害するが、ヒトのDNAは線状だから",
      "ペニシリンは核様体の形成を阻害するが、ヒトは核膜をもつから"
    ],
    ans: 1,
    explain: "✅ ペニシリンはペプチドグリカン（細菌の細胞壁成分）の合成を阻害します。ヒト細胞には細胞壁がないため影響を受けません。これが「選択毒性」です。"
  },
  {
    q: "クロラムフェニコールの作用機序として正しいものはどれか？",
    tag: "クロラムフェニコールの選択毒性",
    opts: [
      "細菌の細胞壁（ペプチドグリカン）合成を阻害する",
      "細菌の70Sリボソームのタンパク質合成を阻害する",
      "細菌のDNA複製を阻害する",
      "細菌の細胞膜の流動性を破壊する"
    ],
    ans: 1,
    explain: "✅ クロラムフェニコールは70Sリボソームのタンパク質合成を阻害します。ただし注意点：ミトコンドリアも70Sリボソームをもつため、クロラムフェニコールはミトコンドリアにも影響を与える可能性があり、骨髄抑制などの副作用の原因となります。"
  },
  {
    q: "原核細胞で転写と翻訳が同時に進行する生理的利点として最も適切なものはどれか？",
    tag: "転写・翻訳の同時進行",
    opts: [
      "エネルギー消費量を増やすことができる",
      "DNAを保護できる",
      "環境変化に対して迅速にタンパク質合成で応答でき、短寿命のmRNAを有効利用できる",
      "リボソームの数を減らすことができる"
    ],
    ans: 2,
    explain: "✅ 原核細胞では核膜がないため、転写（DNA→mRNA）と翻訳（mRNA→タンパク質）が同じ細胞質で同時に進行します。利点は①環境変化への迅速な応答（タンパク質合成速度が速い）、②短寿命mRNAの有効利用です。"
  },
  {
    q: "真核細胞の細胞壁の主な成分として正しい組み合わせはどれか？",
    tag: "細胞壁の成分比較",
    opts: [
      "植物細胞：ペプチドグリカン、菌類：キチン",
      "植物細胞：セルロース、菌類：キチン",
      "植物細胞：キチン、菌類：セルロース",
      "植物細胞・菌類ともに：ペプチドグリカン"
    ],
    ans: 1,
    explain: "✅ 植物細胞の細胞壁はセルロース、菌類（カビ・キノコなど）の細胞壁はキチンが主成分です。細菌（原核細胞）の細胞壁はペプチドグリカンです。"
  },
  {
    q: "細胞内共生説の証拠として「ミトコンドリアは抗生物質に感受性をもつ」が挙げられる理由として正しいものはどれか？",
    tag: "抗生物質感受性の意義",
    opts: [
      "ミトコンドリアが細胞壁をもつから",
      "ミトコンドリアが70Sリボソームをもち、細菌と同様のタンパク質合成機構をもつから",
      "ミトコンドリアが核膜をもつから",
      "ミトコンドリアが線状DNAをもつから"
    ],
    ans: 1,
    explain: "✅ ミトコンドリアは70Sリボソームをもつため、70Sリボソームを標的とする抗生物質（クロラムフェニコールなど）の影響を受けます。これはミトコンドリアの祖先が細菌であるという細胞内共生説を支持する証拠の一つです。"
  }
];

let score = 0;
let answered = [];

function buildQuiz() {
  const container = document.getElementById('quiz-container');
  container.innerHTML = '';
  questions.forEach((q, i) => {
    const card = document.createElement('div');
    card.className = 'question-card' + (i === 0 ? ' active' : '');
    card.id = `q${i}`;
    let optHtml = q.opts.map((o, j) =>
      `<button class="option-btn" onclick="selectAnswer(${i},${j})" id="opt${i}_${j}">
        <span style="font-weight:bold;margin-right:8px;">${['A','B','C','D'][j]}.</span>${o}
      </button>`
    ).join('');
    card.innerHTML = `
      <div class="question-number">問題 ${i+1} / ${questions.length}</div>
      <div class="tag">📌 ${q.tag}</div>
      <div class="question-text">${q.q}</div>
      <div class="options">${optHtml}</div>
      <div class="feedback" id="fb${i}"></div>
      <button class="next-btn" id="next${i}" onclick="nextQuestion(${i})">
        ${i === questions.length-1 ? '結果を見る 🏁' : '次の問題へ →'}
      </button>
    `;
    container.appendChild(card);
  });
}

function selectAnswer(qIdx, optIdx) {
  if (answered[qIdx]) return;
  answered[qIdx] = true;
  const q = questions[qIdx];
  const btns = document.querySelectorAll(`[id^="opt${qIdx}_"]`);
  btns.forEach(b => b.disabled = true);
  btns[q.ans].classList.add('correct');
  const fb = document.getElementById(`fb${qIdx}`);
  if (optIdx === q.ans) {
    score++;
    btns[optIdx].classList.add('correct');
    fb.className = 'feedback show correct-fb';
    fb.innerHTML = `✅ 正解！ ${q.explain}`;
  } else {
    btns[optIdx].classList.add('wrong');
    fb.className = 'feedback show wrong-fb';
    fb.innerHTML = `❌ 不正解。正解は「${['A','B','C','D'][q.ans]}. ${q.opts[q.ans]}」<br><br>${q.explain}`;
  }
  document.getElementById(`next${qIdx}`).classList.add('show');
  updateProgress(answered.filter(Boolean).length);
}

function nextQuestion(qIdx) {
  document.getElementById(`q${qIdx}`).classList.remove('active');
  if (qIdx + 1 < questions.length) {
    document.getElementById(`q${qIdx+1}`).classList.add('active');
    document.getElementById(`q${qIdx+1}`).scrollIntoView({behavior:'smooth', block:'start'});
  } else {
    showResults();
  }
}

function updateProgress(done) {
  const pct = (done / questions.length) * 100;
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('progress-text').textContent = `${done} / ${questions.length} 問完了`;
}

function showResults() {
  document.getElementById('quiz-container').style.display = 'none';
  const results = document.getElementById('results');
  results.style.display = 'block';
  results.scrollIntoView({behavior:'smooth', block:'start'});
  document.getElementById('score-num').textContent = score;
  const pct = Math.round((score / questions.length) * 100);
  document.getElementById('result-pct').textContent = `${pct}%（${score}/${questions.length}問正解）`;
  setTimeout(() => {
    document.getElementById('result-bar-fill').style.width = pct + '%';
  }, 100);
  let msg = '';
  if (pct === 100) msg = '🏆 満点！完璧な理解です！';
  else if (pct >= 85) msg = '🌟 素晴らしい！ほぼ完璧です。';
  else if (pct >= 70) msg = '👍 よくできました！苦手問題を復習しよう。';
  else if (pct >= 50) msg = '📚 半分以上正解！もう一度動画を見直そう。';
  else msg = '💪 動画をもう一度見直してから再挑戦しよう！';
  document.getElementById('score-message').textContent = msg;
}

function restartQuiz() {
  score = 0; answered = [];
  document.getElementById('results').style.display = 'none';
  document.getElementById('quiz-container').style.display = 'block';
  updateProgress(0);
  buildQuiz();
  window.scrollTo({top:0, behavior:'smooth'});
}

buildQuiz();
</script>
</body>
</html>
